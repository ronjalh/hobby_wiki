  # Smykkelaging — Domenekunnskap

  ## Mål
  Gir Claude vokabular og kontekst når Ronja ber om hjelp til å skrive innlegg, foreslå tagger, eller strukturere innhold om smykkelaging.

  > **Ronja**: Fyll inn dine egne materialer, teknikker og leverandører i "Mine notater" seksjonene.

  ## Metaller

  ### Sterling sølv (925)
  - 92.5% sølv, 7.5% andre metaller (oftest kopper)
  - Tarnish (oksidering) over tid — polér eller bruk anti-tarnish
  - Lovpålagt merking: "925" eller "sterling"
  - Populært: tråd (wire), plater, kjeder, findings

  ### Fine silver (999)
  - Rent sølv, mykere enn sterling
  - Mindre tarnish
  - For PMC (Precious Metal Clay) teknikker

  ### Gull-filled (14/20)
  - Tykk gull-lag mekanisk bondet til base-metall
  - Mye rimeligere enn solid gull
  - Varer tiår med god pleie

  ### Gull-belagt / forgylt
  - Tynt gull-lag (kan slites av)
  - Rimeligere enn gull-filled

  ### Kopper
  - Varm, rødlig farge
  - Billig, god å øve på
  - Oksiderer (kan være ønsket for patina-effekt)

  ### Messing
  - Gul, kopper+sink blanding
  - Tarnish over tid

  ### Rustfritt stål
  - Hypoallergent, ingen tarnish
  - Hardt å forme

  ### Niobium / titan
  - Hypoallergent
  - Kan anodiseres for farger

