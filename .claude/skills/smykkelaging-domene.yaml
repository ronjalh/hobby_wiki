  ## Tråd (wire)

  ### Tykkelser (gauge)
  Amerikansk gauge-system:
  - **10 gauge** (~2.6 mm) — veldig tykk, struktur
  - **16 gauge** (~1.3 mm) — jump rings, bra for chainmail
  - **18 gauge** (~1.0 mm) — standard wire-wrap, jump rings
  - **20 gauge** (~0.8 mm) — wire-wrap, earwires
  - **22 gauge** (~0.6 mm) — delikat wire-wrap
  - **24 gauge** (~0.5 mm) — headpins, fin wrap
  - **26-28 gauge** — veldig fint, perleveving

  ### Hardhet
  - **Dead-soft** — lettest å forme, bøyes lett tilbake
  - **Half-hard** — godt kompromiss, standard for wire-wrap
  - **Full-hard** — spring-wire, for clasps

  ## Perler

  ### Glass
  - **Seed beads** — bittesmå (11/0, 15/0), perleveving
  - **Crystal** (Swarovski, Preciosa) — høy-kvalitet, mange farger
  - **Czech fire-polish** — polert, variert
  - **Lampwork** — håndlaget, unike

  ### Edelsteiner
  - **Ametyst** — lilla
  - **Rosenkvarts** — lys rosa
  - **Lapis lazuli** — dyp blå
  - **Howlitt** — hvit med grå stripe
  - **Jade**, **turkis**, **onyx**, **månesten**

  Form på steiner: rondelle, faset, chip, cabochon, teardrop.

  ### Perle (saltvann/ferskvann)
  - Ekte perler — ekte eller kunstig-dyrket
  - "Shell pearls" — imitasjon

  ### Plast/resin
  - Billig, lette, mange former

