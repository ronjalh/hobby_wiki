  ## Findings (smykkedeler)

  - **Jump rings** — runde ringer som holder elementer sammen
  - **Clasps** — låser:
    - Lobster claw, spring ring, toggle, magnetic, hook-and-eye
  - **Earwires** — øredobb-krok (hypoallergene viktig)
  - **Headpins / eyepins** — for perle-dråper
  - **Crimp beads** — låser tau/tråd ved clasps
  - **Bead caps** — dekorasjon rundt perler
  - **Spacer beads** — små mellomperler

  ## Tråd for perling (ikke wire)

  - **Silkesnor** — klassisk for perler, må knytes
  - **Beading wire** (f.eks. Soft Flex) — stål med nylon-kappe, sterk, fleksibel
  - **FireLine / WildFire** — for perleveving, tynn men sterk
  - **Elastisk** — for armbånd uten clasp
  - **Hemp / lær** — rustikk

  ## Verktøy

  ### Tenger
  - **Chain-nose (flat-nose)** — gripe, bøye skarpt
  - **Round-nose** — lage løkker
  - **Flat-nose** — flate flater, gripe uten merker
  - **Crimping pliers** — sette crimp beads
  - **Nylon-jaw** — rette ut tråd uten å merke

  ### Kuttere
  - **Wire cutters** — kutte metall-tråd
  - **Flush cutters** — gir rettere kutt
  - **Memory wire cutters** — for hard memory-wire

  ### Annet
  - **Mandrel** — for ring-størrelse, wire-wrapping
  - **Bead board** — layout-matte med spor
  - **Polishing cloth** — fjerne tarnish

  ## Teknikker

  ### Wire-wrapping
  Bøye og rulle wire for å feste perler/steiner. Mange stiler (herringbone, basket, free-form).

  ### Chainmail
  Koble jump rings til mønster (European 4-in-1, Byzantine, Persian).

  ### Stringing
  Tre perler på snor/wire. Enklest start.

  ### Perleveving (beading)
  - **Peyote** — tett veving, geometriske mønstre
  - **Right-angle weave (RAW)** — mer fleksibel
  - **Brick stitch**, **herringbone**, **ladder stitch**

  ### Bead embroidery
  Sy perler på stoff/skinn, lage broderier og cabochon-innfatninger.

  ### Metal clay (PMC)
  Sølv-leire som tørkes og brennes til fint sølv.

  ### Soldering
  Smelte sammen metall-deler med flam og loddemasse. Mer avansert.

  ### Forming
  Hammering, doming, rolling — gi metall form.

  ## Smykketyper og standardmål

  - **Halskjede**:
    - Choker: 35-40 cm
    - Princess: 45 cm (mest vanlig)
    - Matinee: 55-60 cm
    - Opera: 75-90 cm
  - **Armbånd**:
    - Normal dame: 18-19 cm
    - Herre: 20-22 cm
  - **Øredobber**:
    - Stud, drop, hoop, chandelier
  - **Ringer**:
    - Størrelse i mm diameter eller bokstav/nummer avhengig av system

  ## Allergier
  Vanlige utløsere:
  - **Nikkel** — vanligst
  - **Kopper** — mindre vanlig
  - **Noen gull-legeringer** (med nikkel)

  Hypoallergene: kirurgisk stål, titan, niobium, 14k+ solid gull, sterling (hvis nikkel-fri legering).

  ## Vedlikehold
  - Sølv: polér med anti-tarnish-duk
  - Gull-filled: vask mildt med såpevann
  - Perler: tørk av etter bruk, oppbevar separat
  - Oppbevar i lukket pose for å redusere oksidasjon

  ## Tagg-forslag
  `sterlingsolv`, `gull-filled`, `kopper`, `rustfritt-stal`,
  `wire-wrap`, `chainmail`, `perleveving`, `stringing`,
  `halskjede`, `armband`, `oredobber`, `ring`, `brosje`,
  `glassperler`, `edelstein`, `krystall`, `ferskvannsperle`,
  `julegave`, `bestilt`, `hypoallergen`, `unike`,
  `nybegynner`, `avansert`

  ## Rules
  - Bruk norsk fag-terminologi (sterlingsølv, tråd-tykkelse, findings)
  - For størrelser: bruk metrisk (mm) primært, gauge sekundært
  - Understrek hypoallergene for øredobber
  - Ikke gi verdi-vurderinger på smykker — fokus på håndverk og materialer
  - Respekter Ronjas egne preferanser i "Mine notater"
