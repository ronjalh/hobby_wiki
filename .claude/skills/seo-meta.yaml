name: seo-meta
description: SEO metadata, OpenGraph, sitemap, robots.txt for public pages
version: 1.0.0
tags: [seo, metadata, opengraph, sitemap]

instructions: |
  # SEO og Metadata

  ## Mål
  Google og sosiale medier skal finne og vise innleggene pent. Særlig viktig for roten `/` og hobby-sider.

  ## Metadata per side (Next.js App Router)

  ### Root layout
  ```tsx
  // src/app/layout.tsx
  export const metadata: Metadata = {
    metadataBase: new URL('https://hobby-wiki.vercel.app'),
    title: {
      default: 'Ronja sitt hobbyunivers',
      template: '%s · Ronja',
    },
    description: 'Håndlagde lys og smykker — historier bak hvert stykke',
    openGraph: {
      type: 'website',
      locale: 'nb_NO',
      siteName: 'Ronja sitt hobbyunivers',
    },
    twitter: {
      card: 'summary_large_image',
    },
  };
  ```

  ### Hobby-forside
  ```tsx
  // src/app/(public)/lys/page.tsx
  export const metadata: Metadata = {
    title: 'Lysstøping',
    description: 'Håndlagde lys av soya, bivoks og parafin. Se prosessen.',
    openGraph: {
      images: ['/og/lys-cover.jpg'],
    },
  };
  ```

  ### Post-side (dynamisk)
  ```tsx
  export async function generateMetadata({ params }: Props): Promise<Metadata> {
    const { hobby, slug } = await params;
    const post = await getPost(hobby, slug);
    if (!post) return {};

    return {
      title: post.title,
      description: post.excerpt ?? post.title,
      openGraph: {
        title: post.title,
        description: post.excerpt,
        images: post.coverImageUrl ? [post.coverImageUrl] : [],
        type: 'article',
        publishedTime: post.publishedAt?.toISOString(),
      },
    };
  }
  ```

  ## Sitemap
  ```tsx
  // src/app/sitemap.ts
  import { MetadataRoute } from 'next';
  import { db } from '@/db';
  import { posts } from '@/db/schema';
  import { eq } from 'drizzle-orm';

  export default async function sitemap(): Promise<MetadataRoute.Sitemap> {
    const allPosts = await db.query.posts.findMany({
      where: eq(posts.published, true),
    });

    const base = 'https://hobby-wiki.vercel.app';

    const staticRoutes = [
      { url: base, lastModified: new Date(), priority: 1.0 },
      { url: `${base}/start`, priority: 0.8 },
      { url: `${base}/lys`, priority: 0.9 },
      { url: `${base}/smykker`, priority: 0.9 },
    ];

    const postRoutes = allPosts.map((post) => ({
      url: `${base}/${post.hobby}/${post.slug}`,
      lastModified: post.updatedAt,
      priority: 0.7,
    }));

    return [...staticRoutes, ...postRoutes];
  }
  ```

  ## Robots.txt
  ```tsx
  // src/app/robots.ts
  import { MetadataRoute } from 'next';

  export default function robots(): MetadataRoute.Robots {
    return {
      rules: {
        userAgent: '*',
        allow: '/',
        disallow: ['/admin/', '/api/', '/login'],
      },
      sitemap: 'https://hobby-wiki.vercel.app/sitemap.xml',
    };
  }
  ```

  ## Structured data (JSON-LD)
  For post-detaljsider:
  ```tsx
  function PostJsonLd({ post }: Props) {
    const data = {
      '@context': 'https://schema.org',
      '@type': 'Article',
      headline: post.title,
      image: [post.coverImageUrl],
      datePublished: post.publishedAt?.toISOString(),
      dateModified: post.updatedAt.toISOString(),
      author: { '@type': 'Person', name: 'Ronja' },
    };
    return (
      <script
        type="application/ld+json"
        dangerouslySetInnerHTML={{ __html: JSON.stringify(data) }}
      />
    );
  }
  ```

  ## OG-bilder
  Per side kan vi generere dynamiske OG-bilder (Vercel OG):
  ```tsx
  // src/app/(public)/[hobby]/[slug]/opengraph-image.tsx
  import { ImageResponse } from 'next/og';

  export const size = { width: 1200, height: 630 };
  export const contentType = 'image/png';

  export default async function Image({ params }: Props) {
    const post = await getPost(params.hobby, params.slug);
    return new ImageResponse(
      <div style={{ /* ... */ }}>
        <h1>{post?.title}</h1>
      </div>,
      { ...size }
    );
  }
  ```

  ## Canonical URLs
  Next.js gjør dette automatisk. Men for post-sider med query-params (`?tag=...`), sett canonical manuelt:
  ```tsx
  export const metadata = {
    alternates: {
      canonical: `/lys/${slug}`,
    },
  };
  ```

  ## Ekskludér admin fra indeksering
  - `/admin/*` — `noindex` via layout
  - `/login` — `noindex`
  ```tsx
  export const metadata = {
    robots: { index: false, follow: false },
  };
  ```

  ## Favicon og apple-touch-icons
  Plassér i `src/app/`:
  - `icon.png` (32×32 eller 192×192)
  - `apple-icon.png` (180×180)
  - `favicon.ico` (kan fjernes hvis `icon.png` finnes)

  ## Akseptansekriterier
  - Hver side har unik title og description
  - Post-sider har OG-image
  - Sitemap inkluderer alle publiserte innlegg
  - `/admin/*` og `/login` er ekskludert
  - Google Rich Results Test godkjenner JSON-LD

  ## Rules
  - Aldri indekser utkast eller admin-sider
  - Descriptions: 150-160 tegn, beskrivende
  - Titles: 50-60 tegn
  - Bilder i OG må være 1200×630px og under 5 MB
