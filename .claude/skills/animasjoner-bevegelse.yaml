instructions: |
  # Animasjoner og Bevegelse

  ## Mål
  Subtile animasjoner som gir personlighet. Alle respekterer `prefers-reduced-motion`.

  ## Stack
  - `framer-motion` — komplekse animasjoner, layout-transitions
  - CSS keyframes — enkle loops (marquee, glow)
  - View Transitions API (senere, valgfritt)

  ## Globalt hook
  ```typescript
  // src/hooks/useReducedMotion.ts
  import { useReducedMotion as useFMReduced } from 'framer-motion';
  export const useReducedMotion = useFMReduced;
  ```

  Eller via CSS:
  ```css
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
  ```

  ## Kjerne-animasjoner

  ### 1. Blomst vokser ved hover (post-kort)
  ```tsx
  'use client';
  import { motion } from 'framer-motion';

  export function FlowerGrowOnHover() {
    return (
      <motion.div
        className="absolute bottom-2 right-2 w-6 h-6 opacity-0 group-hover:opacity-100"
        initial={{ scale: 0, rotate: 0 }}
        whileHover={{ scale: 1, rotate: 180 }}
        transition={{ type: 'spring', stiffness: 200, damping: 15 }}
      >
        <PurpleFlowerSVG />
      </motion.div>
    );
  }
  ```

  Forbedret versjon: blomsten vokser fra et lite frø, får kronblader én og én.

  ### 2. Voks-drypp loading
  ```tsx
  export function WaxDripLoader() {
    return (
      <div className="flex justify-center">
        {[0, 1, 2].map((i) => (
          <motion.div
            key={i}
            className="w-2 h-8 bg-[var(--color-lys-500)] rounded-b-full mx-1"
            animate={{ scaleY: [1, 1.5, 1] }}
            transition={{
              duration: 1.2,
              delay: i * 0.2,
              repeat: Infinity,
              ease: 'easeInOut',
            }}
          />
        ))}
      </div>
    );
  }
  ```

  ### 3. Kjede-bygging (smykke-loading)
  Perler "faller" ned og settes sammen til en kjede.
  ```tsx
  export function ChainBuildLoader() {
    return (
      <div className="flex gap-1 justify-center">
        {[0, 1, 2, 3, 4].map((i) => (
          <motion.div
            key={i}
            className="w-3 h-3 rounded-full bg-[var(--color-smykker-500)]"
            initial={{ y: -20, opacity: 0 }}
            animate={{ y: 0, opacity: 1 }}
            transition={{
              delay: i * 0.15,
              repeat: Infinity,
              repeatDelay: 1.5,
              duration: 0.4,
            }}
          />
        ))}
      </div>
    );
  }
  ```

  ### 4. Side-overganger
  ```tsx
  // src/app/(public)/template.tsx
  'use client';
  import { motion } from 'framer-motion';

  export default function Template({ children }: Props) {
    return (
      <motion.div
        initial={{ opacity: 0, y: 8 }}
        animate={{ opacity: 1, y: 0 }}
        transition={{ duration: 0.3 }}
      >
        {children}
      </motion.div>
    );
  }
  ```

  ### 5. Ankomst-animasjon per hobby
  **Lys**: Flamme tennes ved sideankomst (bare første gang på økten)
  ```tsx
  export function FlameAnimation({ onComplete }: Props) {
    return (
      <motion.div
        initial={{ scale: 0, opacity: 0 }}
        animate={{ scale: 1, opacity: 1 }}
        exit={{ scale: 0.8, opacity: 0 }}
        transition={{ duration: 0.8, ease: 'easeOut' }}
        onAnimationComplete={onComplete}
      >
        <FlameSVG />
      </motion.div>
    );
  }
  ```

  ### 6. Scroll-trigger reveal
  ```tsx
  export function FadeInOnScroll({ children }: Props) {
    return (
      <motion.div
        initial={{ opacity: 0, y: 16 }}
        whileInView={{ opacity: 1, y: 0 }}
        viewport={{ once: true, margin: '-100px' }}
        transition={{ duration: 0.5 }}
      >
        {children}
      </motion.div>
    );
  }
  ```

  ### 7. Magnetic button (subtilt)
  Knappen forskyves litt mot musepekeren.
  ```tsx
  export function MagneticButton({ children }: Props) {
    const [pos, setPos] = useState({ x: 0, y: 0 });
    const ref = useRef<HTMLButtonElement>(null);

    function handleMouse(e: React.MouseEvent) {
      const rect = ref.current?.getBoundingClientRect();
      if (!rect) return;
      const x = (e.clientX - rect.left - rect.width / 2) * 0.15;
      const y = (e.clientY - rect.top - rect.height / 2) * 0.15;
      setPos({ x, y });
    }

    return (
      <motion.button
        ref={ref}
        onMouseMove={handleMouse}
        onMouseLeave={() => setPos({ x: 0, y: 0 })}
        animate={{ x: pos.x, y: pos.y }}
        transition={{ type: 'spring', stiffness: 200, damping: 15 }}
      >
        {children}
      </motion.button>
    );
  }
  ```

  ## Animasjon-prinsipper (Disney/Apple)
  - **Ease**: Aldri linear (unntatt konstant bevegelse som marquee). Bruk `easeOut` for inntre, `easeIn` for utgå, spring for interaktivt.
  - **Timing**: Raskt (150-300ms) for UI-feedback, tregere (400-800ms) for fortellende animasjoner.
  - **Fysikalitet**: Tyngde og momentum. Spring-animasjoner føles naturlig.
  - **Intensjon**: Animasjon skal kommunisere noe — retning, hierarki, status.

  ## Reduced motion-strategi
  ```tsx
  const reducedMotion = useReducedMotion();
  <motion.div
    animate={reducedMotion ? {} : { scale: 1.05 }}
    transition={{ duration: reducedMotion ? 0 : 0.3 }}
  />
  ```

  Eller: vis statisk endpoint uten mellom-tilstander.

  ## Akseptansekriterier
  - Alle animasjoner har reduced-motion fallback
  - Ingen animasjon blokkerer interaksjon
  - Ytelse: 60 FPS på moderne enhet
  - Animasjoner har hensikt — ikke bare "fordi det er kult"

  ## Rules
  - ALLTID sjekk `useReducedMotion()` i interaktive animasjoner
  - Bruk `transform` og `opacity` — ikke `left`/`top`/`width` (GPU-akselerert)
  - Animasjon over 800ms må ha "skip"-option eller være stoppbar
  - Test med reduced-motion aktivert
