  ## Rules
  - Bruk norsk fag-terminologi (søm, broderi, mønster, sikksakk, korssting)
  - Skill mellom maskinsøm og handsøm der det er relevant
  - For broderi: nevn garn-merke og fargekode (DMC 310 = sort) når relevant
  - Bevar "håndverk"-følelsen — dette er ikke industriproduksjon
  - Respekter Ronjas egne preferanser i "Mine notater"
