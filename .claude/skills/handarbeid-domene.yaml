  ## Nåler og tråd

  ### Sy-maskinnåler
  - **Universal** — standard for woven stoff (90/14)
  - **Jersey/ball-point** — for strikkede stoff
  - **Stretch** — for elastiske stoff (lycra)
  - **Denim** — for tykt stoff
  - **Microtex** — fin nål for silke, mikrofiber

  Nålestørrelse: lavere nummer = tynnere nål. Velg etter stofftykkelse.

  ### Hånd-nåler
  - **Sharps** — allsidig
  - **Embroidery/crewel** — lengre øye for garn
  - **Tapestry** — butt spiss, for korssting
  - **Milliners** — lang, for skjørt-kanter

  ### Tråd-typer
  - **Allroundtråd** (polyester/bomull) — for søm generelt
  - **Topstitch-tråd** — tykkere, for synlige sømmer
  - **Broderigarn** — flosset, flere tråder kan deles
  - **Perletråd** — sterk, tynn for perlebroderi

