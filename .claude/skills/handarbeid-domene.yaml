  ## Teknikker — søm

  ### Grunnleggende
  - **Rett sting (straight stitch)** — grunnleggende søm
  - **Sikksakk** — hindrer fryn
  - **Overlock** — ren kant på stretchy stoff
  - **Knapphullssøm** — ferdig kant rundt knapphull

  ### Sømtyper
  - **Enkel søm** — to stoff sammen
  - **Engelsk søm** — ingen synlige kanter
  - **Flatt-sydd søm** — for robuste plagg (jeans)
  - **Fransk søm** — for delikate stoff (silke, chiffon)

  ### Monstre og mønstre
  - Kommerselle mønstre (Burda, Simplicity, Ottobre, Ankers)
  - Selvlagde mønstre
  - Digitale PDF-mønstre

  ### Mine notater
