  # Nål og tråd — Domenekunnskap

  ## Mål
  Gir Claude vokabular og kontekst når Ronja ber om hjelp til å skrive innlegg om søm, broderi og arbeid med stoff.

  > **Ronja**: Fyll inn dine egne teknikker, materialer og leverandører i "Mine notater" seksjonene.

  ## Stoff

  ### Naturfibre
  - **Bomull** — mye brukt, lett å sy, krymper ved vask
  - **Lin** — lett sommerstoff, rynker lett
  - **Silke** — eksklusivt, glatt, kan glide når man syr
  - **Ull** — varmt, strukket, drapert pent
  - **Hamp** — robust, miljøvennlig

  ### Syntetiske/blandet
  - **Polyester** — rimelig, rynker lite, ikke pustende
  - **Viskose** — halvkunstig, drapert
  - **Fleece** — varm, mykt

  ### Egenskaper å vurdere
  - **Vektklasse**: lett / medium / tung
  - **Strekk**: woven (ingen strekk) vs. jersey/strikket (strekker)
  - **Mønster**: ensfarget, print, stripet, rutete
  - **Veving**: canvas, popelin, sateng, chiffon

