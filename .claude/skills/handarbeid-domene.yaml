  ## Broderi

  ### Teknikker
  - **Korssting (cross stitch)** — klassisk, X-form
  - **Flatsøm (satin stitch)** — fyller flater med tette parallelle sting
  - **Kjedesting (chain stitch)** — dekorativ linje
  - **Stemsting (stem stitch)** — tynn linje, krøller
  - **Franske knuter** — små knuter, ofte for blomster-detaljer
  - **Seed stitch** — små spredte sting
  - **Bullion stitch** — rullede sting
  - **Needlepainting** — malerisk, realistisk

  ### Materialer
  - **Broderigarn (floss)** — 6 tråder som kan deles, DMC/Anchor er klassikere
  - **Perlegarn** — tvinnet, mer glans
  - **Metallgarn** — dekorativt, tricky å jobbe med
  - **Crewel-ull** — tradisjonelt engelsk

  ### Stoff for broderi
  - **Aida cloth** — for korssting, tydelige kvadrater
  - **Evenweave** — jevnt vevd, for friere broderi
  - **Kanvasstoff** — for needlepoint
  - **Vanlig stoff** — for brodering direkte på plagg

  ### Verktøy
  - **Broderiring/ramme** — holder stoff spent
  - **Stickmaskin** (valgfritt) — for repeterende mønstre

