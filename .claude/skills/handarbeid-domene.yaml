  ## Andre tekstilteknikker

  ### Quilting
  - Lappete tepper, flere lag sammensydd
  - Patchwork, foundation piecing, English paper piecing

  ### Applique
  - Ett stoff sydd på et annet
  - Kan kombineres med broderi

  ### Strikking (valgfritt å dekke)
  - Pinner, garn, masker, kast
  - Typer: right stitch, left stitch, increase, decrease

  ### Hekling
  - Heklenål + garn, løkker
  - Typer: luftmasker, fastmasker, stavmasker

  ### Vev
  - Enkel ramvev, båndvev
  - Flere tråder (varp og veft)

  ## Sikkerhet og ergonomi
  - Pass på fingrene ved maskin-søm
  - Bruk fingerbøl for hånd-søm
  - God belysning — øyne blir fort slitne
  - Pauser for nakke og skuldre

  ## Vedlikehold
  - Stryk stoff før skjæring (ingen krymping senere)
  - Vask test-stoff for å forutse krymping
  - Oppbevar broderi i ramme, ikke brettet
  - Silketråd og natur-garn trenger mott-beskyttelse

