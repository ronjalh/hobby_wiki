name: responsiv-layout
description: Mobile-first responsive layout with fluid grids, container queries, and clamp()
version: 1.0.0
tags: [responsive, layout, css, mobile-first]

instructions: |
  # Responsiv Layout — Mobile-first med fleksible maler

  ## Mål
  Siden skal fungere vakkert på alt fra mobil (320px) til stor skjerm (2560px+).
  Bruker moderne CSS: Grid, Flexbox, container queries, `clamp()`.

  ## Prinsipper
  - **Mobile-first** — design minste skjerm først, bygg opp
  - **Content-first** — velg innhold, design maler deretter
  - **Fluid over breakpoints** — der mulig, la ting flyte kontinuerlig
  - **Container queries** — komponenter reagerer på sin container, ikke bare viewport

  ## Breakpoints (Tailwind default)
  ```
  sm:  640px   (små tablets, landscape mobiler)
  md:  768px   (tablets)
  lg:  1024px  (laptop)
  xl:  1280px  (desktop)
  2xl: 1536px  (stor desktop)
  ```

  ## Fluid typografi
  ```css
  /* Skalerer kontinuerlig mellom viewport-størrelser */
  h1 { font-size: clamp(2rem, 4vw + 1rem, 4rem); }
  h2 { font-size: clamp(1.5rem, 3vw + 0.5rem, 3rem); }
  p  { font-size: clamp(1rem, 1vw + 0.75rem, 1.125rem); }
  ```

  Tailwind-utility:
  ```css
  @utility text-fluid-hero { font-size: clamp(2.5rem, 5vw + 1rem, 5rem); }
  @utility text-fluid-heading { font-size: clamp(1.5rem, 3vw + 0.5rem, 2.5rem); }
  ```

  ## Fluid spacing
  ```css
  .section { padding-block: clamp(3rem, 8vw, 8rem); }
  ```

  ## Grid-layouts (fleksible)

  ### Auto-fit kort
  ```css
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1rem;
  }
  ```
  Kortene tilpasser seg — trenger ikke breakpoints for kolonne-antall.

  ### Kombinert container + viewport
  ```tsx
  <div className="@container grid grid-cols-1 @md:grid-cols-2 @lg:grid-cols-3 gap-4">
    ...
  </div>
  ```
  (Tailwind v4 har innebygd container query-støtte)

  ## Masonry (CSS columns)
  Responsiv uten media queries:
  ```css
  .masonry {
    columns: 1;
    column-gap: 1rem;
  }
  @media (min-width: 640px) { .masonry { columns: 2; } }
  @media (min-width: 1024px) { .masonry { columns: 3; } }
  @media (min-width: 1280px) { .masonry { columns: 4; } }
  ```

  Eller Tailwind: `columns-1 sm:columns-2 lg:columns-3 xl:columns-4`

  ## Bilde-responsivt
  Next.js `<Image>` genererer automatisk srcset:
  ```tsx
  <Image
    src={post.coverImageUrl}
    alt={post.title}
    width={1200}
    height={800}
    sizes="(max-width: 640px) 100vw, (max-width: 1024px) 50vw, 33vw"
    className="w-full h-auto"
  />
  ```
  `sizes` forteller nettleseren hvilken bredde bildet vil ha ved ulike breakpoints.

  ## Navigasjon
  - **Mobil**: Hamburger-meny eller bottom-dock
  - **Desktop**: Horisontal topmeny

  ```tsx
  <>
    <DesktopNav className="hidden md:flex" />
    <MobileNav className="md:hidden" />
  </>
  ```

  ## Hobby-sider (spesielt)
  - Mobil: Bento-grid blir single-kolonne stacked
  - Tablet: 2 kolonner
  - Desktop: Full bento-layout med ulike størrelser

  ## Post-detaljside
  - Mobil: Bilde full bredde, tekst under
  - Desktop: Sticky sidepanel med bilde, tekst til høyre

  ## Touch-targets
  - Minimum 44×44px klikkbart område på mobil
  - Tailwind: `min-h-11 min-w-11` på knapper/lenker

  ## Plan for å skalere opp
  Start minimalt, legg til når du trenger:
  1. Først: `grid-cols-1` + enkelt stack
  2. Legg til `md:grid-cols-2` når innhold krever det
  3. Test, ikke anta

  ## Test-regime
  Alltid test før merge:
  1. Chrome DevTools responsive mode (375px, 768px, 1280px, 1920px)
  2. Rotér mobil (portrait → landscape)
  3. Zoom-inn til 200% (tilgjengelighet)
  4. Test med ekte mobil hvis mulig

  ## Akseptansekriterier
  - Fungerer på 320px bredde (smallest supported)
  - Ingen horisontal scroll på noen breakpoint
  - Touch-targets minst 44px
  - Tekst lesbar uten horisontal scroll eller zoom
  - Bilder skalerer uten å knekke layout

  ## Rules
  - ALDRI fast pixel-bredde på innholdskontainere
  - ALLTID `max-w-*` i stedet for `w-*` for containere
  - Bilder må ha `width` og `height` satt (unngår layout shift)
  - Bruk `clamp()` for ting som skal skalere glatt
  - Test på minst 3 viewport-størrelser før merge
