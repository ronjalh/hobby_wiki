  ## Duftoljer

  ### Mengde
  - **Fragrance load**: 6-10% av vokstens vekt
  - For sterk: over 12% kan gi dårlig brenn
  - For svak: under 5% — knapt merkbar duft

  ### Tilsettingstemperatur
  - Soya: 80-85 °C
  - Parafin: 75-80 °C
  - Bivoks: 70 °C (for å ikke "brenne" duften)

  ### Typer
  - **Fragrance oils (FO)** — syntetisk, mange varianter, sterk
  - **Essential oils (EO)** — naturlig, dyrere, mer subtil

  ### Mine notater
  <!-- Favorittdufter? Leverandører? Blandinger? -->

  ## Farger

  ### Typer
  - **Flytende fargestoff** — enklest å dosere
  - **Fargeblokk** — må smeltes, kraftig
  - **Fargechips** — mellomting

  ### Tips
  - Start med mindre farge enn du tror
  - Test ved å dryppe på hvitt papir (ferdig lys blir lysere når det kjøler)

  ### Mine notater
  <!-- Favorittfarger? Lilla-blandinger? -->

  ## Lys-typer

  ### Container-lys
  Støpes direkte i glass/beholder. Vanlig for duftlys.

  ### Pilar-lys
  Fristående. Krever form (støpeform) og frigjøring.

  ### Votiv
  Små, selvbrennende i egen beholder.

  ### Refill
  Lys-kapsler som fyller eksisterende holdere.

  ### Taper
  Tradisjonelle, lange, tynne (dyp-støpte eller formet).

  ## Prosess (grunnsteg)
  1. Vei voks, smelt i bain-marie til riktig temperatur
  2. Avkjøl litt, tilsett duftolje og farge, rør forsiktig
  3. Forbered beholder med veke (bruk veke-lim eller varmepistol)
  4. Hell voksen ved "pour temperature" (varierer per voks)
  5. La størkne — unngå vibrasjoner/temperatursvingninger
  6. Trim veke til 5-6 mm før første brenning
  7. **Curing**: La stå 1-2 uker før bruk for best duft-kast

  ## Vanlige problemer

  ### Frosting (soya)
  Hvite krystaller på overflaten. Kosmetisk, ikke skadelig. Preventivt:
  - Bruk voks spesifikt laget for container
  - Ikke avkjøl for raskt

  ### Sinkhole
  Hulrom rundt veken. Årsak: avkjøling for raskt eller ujevnt.
  Fix: topp opp med ekstra voks.

  ### Wet spots
  Bobler mellom voks og glass. Glass for kaldt ved støping.
  Fix: varm glassene lett før støping.

  ### Tunneling
  Lys brenner kun midten. Årsak: for kort første brenning (burde brenne til full "melt pool" — kant til kant).

  ### Dårlig duft-kast
  - For lite FO
  - FO tilsatt ved feil temperatur
  - Ikke nok curing-tid
  - Feil veke-størrelse (for liten melt pool)

  ### Røyk/sot
  - Veke for stor
  - Veke ikke trimmet (trim til 5-6 mm)
  - Trekkfylt område

  ## Sikkerhet
  - Smeltepunkt opp mot 100 °C — forbrenning mulig
  - Duftolje kan være brannfarlig
  - Glass må være varmebestandig (vanlig bolsjeglass kan sprekke)
  - Aldri uten tilsyn ved støping
  - Flash point på duftoljer — sjekk datablad

  ## Tagg-forslag (for filtrering)
  `soya-voks`, `parafin`, `bivoks`, `palmevoks`, `kokosvoks`,
  `duft-vanilje`, `duft-lavendel`, `duft-essensiell`, `uten-duft`,
  `pilar`, `container`, `refill`, `votiv`, `taper`,
  `nybegynner`, `avansert`, `eksperiment`,
  `julegave`, `bursdag`, `bestilt`

  ## Rules
  - Når du hjelper skrive innlegg: bruk norsk fag-terminologi (støpe, melt pool, curing, voks-bolle)
  - Foreslå relevante tagger fra listen
  - Respekter Ronjas egne preferanser (se "Mine notater"-seksjoner)
  - Ikke gi medisinske råd om aroma-terapi — hold det til håndverk
