  # Lysstøping — Domenekunnskap

  ## Mål
  Gir Claude vokabular og kontekst når Ronja ber om hjelp til å skrive innlegg, foreslå tagger, eller strukturere innhold om lysstøping.

  > **Ronja**: Fyll inn dine egne teknikker, materialer og preferanser i "Mine notater" seksjonene under — det gjør skillen mye mer nyttig.

  ## Vokstyper

  ### Soya-voks
  - Plantebasert, vegansk
  - Smeltepunkt: 46-55 °C
  - Brennes rent, lite sot
  - Tar duft bra
  - Godt for container-lys

  ### Parafin
  - Petroleum-basert (billig, mye brukt)
  - Smeltepunkt: 52-70 °C
  - Sterkt duft-kast
  - Kan lage mer sot

  ### Bivoks
  - Naturlig, fra bier
  - Smeltepunkt: 62-65 °C
  - Lett honning-duft, varmt gult lys
  - Lang brenntid
  - Dyrere

  ### Palmevoks
  - Plantebasert, lager "krystall"-effekt
  - Smeltepunkt: 60 °C
  - Kontroversielt pga. miljø (velg RSPO-sertifisert)

  ### Kokosvoks
  - Mykt, kremet, tar duft veldig bra
  - Ofte blandet med soya
  - Rent å brenne

