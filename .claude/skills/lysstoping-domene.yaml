  ## Veker

  ### Typer
  - **Bomull** — klassisk, rent brenn
  - **Tre-veker** — knitrer, bredere flamme
  - **Hemp** — naturlig, litt røykere
  - **Zinkkjerne** — foreldet, ikke anbefalt (helserisiko)

  ### Størrelser
  Veke-størrelse avhenger av:
  - Diameter på lys (viktigst)
  - Vokstype
  - Duftolje-mengde

  Generelle tabeller finnes hos leverandører (f.eks. CandleScience, Rustic Escentuals).

  ### Mine notater (Ronja fyller inn)
