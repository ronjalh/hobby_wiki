name: google-oauth
description: NextAuth.js v5 with Google OAuth + Drizzle adapter for hobby_wiki
version: 1.0.0
tags: [auth, google, oauth, nextauth, security]

instructions: |
  # Google OAuth — Autentisering

  ## Stack
  - NextAuth.js v5 (Auth.js) + Google provider
  - Drizzle adapter lagrer users/sessions/accounts i Neon
  - Ingen passord — Google håndterer alt

  ## Oppsett

  ### 1. Google Cloud Console
  1. console.cloud.google.com → nytt prosjekt "HobbyWiki"
  2. APIs & Services → Credentials → Create OAuth 2.0 Client ID
  3. Application type: Web application
  4. Authorized redirect URIs:
     - `http://localhost:3000/api/auth/callback/google` (dev)
     - `https://hobby-wiki.vercel.app/api/auth/callback/google` (prod)
  5. Kopier Client ID og Secret til Vercel env vars

  ### 2. NextAuth-konfigurasjon
  ```typescript
  // src/lib/auth/config.ts
  import NextAuth from 'next-auth';
  import Google from 'next-auth/providers/google';
  import { DrizzleAdapter } from '@auth/drizzle-adapter';
  import { db } from '@/db';

  export const { handlers, signIn, signOut, auth } = NextAuth({
    adapter: DrizzleAdapter(db),
    providers: [
      Google({
        clientId: process.env.AUTH_GOOGLE_ID!,
        clientSecret: process.env.AUTH_GOOGLE_SECRET!,
      }),
    ],
    callbacks: {
      async session({ session, user }) {
        // Hent role fra db og legg på session
        const dbUser = await db.query.users.findFirst({
          where: eq(users.id, user.id),
        });
        if (dbUser) {
          session.user.role = dbUser.role;
          session.user.id = user.id;
        }
        return session;
      },
    },
    pages: {
      signIn: '/login',
    },
  });
  ```

  ### 3. Type-utvidelse
  ```typescript
  // src/types/next-auth.d.ts
  import 'next-auth';

  declare module 'next-auth' {
    interface Session {
      user: {
        id: string;
        role: 'admin' | 'user';
      } & DefaultSession['user'];
    }
  }
  ```

  ### 4. Route handler
  ```typescript
  // src/app/api/auth/[...nextauth]/route.ts
  export { GET, POST } from '@/lib/auth/config';
  ```

  ### 5. Innloggingsside
  Se `admin-panel` skill for UI.

  ## Rolle-system
  Se `admin-roller` skill for full detalj.

  ## Tilgangskontroll
  - Public sider (`/`, `/start`, `/lys`, `/smykker`, `/lys/[slug]`) — ingen auth-krav
  - Admin-sider (`/admin/*`) — krever `auth()` OG `session.user.role === 'admin'`

  ## Middleware
  ```typescript
  // src/middleware.ts
  export { auth as middleware } from '@/lib/auth/config';

  export const config = {
    matcher: ['/admin/:path*'],
  };
  ```

  ## Server Actions
  ```typescript
  'use server';
  import { auth } from '@/lib/auth/config';

  export async function createPost(data: PostData) {
    const session = await auth();
    if (!session?.user || session.user.role !== 'admin') {
      throw new Error('Unauthorized');
    }
    // ... opprett innlegg
  }
  ```

  ## Akseptansekriterier
  - Logg inn med Google på /login → sendes tilbake til /admin
  - Session inneholder `user.id` og `user.role`
  - Middleware blokkerer ikke-admins fra `/admin/*`

  ## Rules
  - ALLE Server Actions som muterer data må verifisere `auth() + role === 'admin'`
  - ALDRI lagre Google access tokens lenger enn NextAuth-session
  - Første bruker må settes til admin manuelt i db
